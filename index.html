<!doctype html>
<html lang="ja">
  <head>
    <style>
      /* 1. bodyとhtmlのデフォルト設定をリセット */
      html, body {
        margin: 0;
        padding: 0;
        /* bodyの高さをビューポートの高さに合わせる */
        height: 100vh; 
        /* body全体の縦横スクロールを禁止 */
        overflow: hidden; 
      }

      /* 2. アプリのルート要素（#root）を画面いっぱいに広げる */
      #root {
        /* bodyの高さ100vhに合わせるか、100%に設定 */
        height: 100vh;
        width: 100vw;
        
        /* Flexboxを使って、#root内でヘッダー/メイン/フッターのレイアウトを可能にする */
        display: flex;
        flex-direction: column; 
      }
      
      /* 3. 例: アプリ内のヘッダーやメインエリアのスタイル（これは例です） */
      .header {
        height: 60px; /* ヘッダーの固定の高さ */
        background-color: #333;
        color: white;
      }
      
      .main-area {
        flex-grow: 1; /* 残りの高さをすべて占める */
        /* コンテンツが#rootの高さを超えても、この中でのみスクロールさせる場合は以下を使用 */
        /* overflow-y: auto; */
      }

/* ヘッダーなど、常に一定の高さを保つ要素 */
.app-header {
    height: 80px;      /* 固定の高さ */
    flex-shrink: 0;    /* 縮小しない */
}

/* メインコンテンツエリア（データが表示される場所） */
.app-main-content {
    flex-grow: 1;      /* ★ これが重要！残りの高さをすべて埋める */
    
    /* データの量が多くてこのエリア内でもはみ出す場合は、
       このエリア内でのみスクロールできるようにする（ページ全体はスクロールしない） */
    overflow-y: auto;
    overflow-x: hidden;
}
    </style>

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>リアルタイム気象データ</title>
    <meta name="description" content="気象データをリアルタイムで表示するWebアプリケーション" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
